# DCX Agent — Nginx 리버스 프록시 설정
# 설치: sudo cp nginx/dcx-agent.conf /etc/nginx/sites-available/dcx-agent
#       sudo ln -s /etc/nginx/sites-available/dcx-agent /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # EC2 퍼블릭 IP 또는 도메인으로 변경

    # 요청 크기 제한 (크롤링 데이터 전송용)
    client_max_body_size 50M;

    # 프론트엔드 (Next.js standalone)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 API (/api/ → backend:8000)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 크롤링/학습 등 긴 작업을 위한 타임아웃 연장
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # 헬스체크
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}

