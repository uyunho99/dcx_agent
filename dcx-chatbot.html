<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f5f5f5;height:100vh;overflow:hidden}
.top-bar{background:#1a237e;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;height:48px}
.top-bar h2{font-size:17px}.top-bar .si{font-size:12px;opacity:.8}
.main{display:flex;height:calc(100vh - 48px)}
.lp{flex:1;display:flex;flex-direction:column;border-right:1px solid #e0e0e0;min-width:0}
.rp{width:380px;display:flex;flex-direction:column;background:#fff;flex-shrink:0}
#rpPipe,#rpIns{display:flex;flex-direction:column;flex:1;min-height:0}
#rpIns.hd{display:none}
.tabs{display:flex;border-bottom:2px solid #e0e0e0;background:#fff;flex-shrink:0}
.tab{padding:10px 20px;cursor:pointer;font-weight:600;font-size:14px;color:#999;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:#5c6bc0;border-bottom-color:#5c6bc0}
.steps{display:flex;align-items:center;padding:10px 14px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0;gap:2px}
.sd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:#bdbdbd;flex-shrink:0}
.sd.dn{background:#4caf50}.sd.ac{background:#5c6bc0;box-shadow:0 0 0 3px rgba(92,107,192,.3)}
.sl{flex:1;height:2px;background:#e0e0e0;min-width:12px}.sl.dn{background:#4caf50}
.ps{flex:1;overflow-y:auto;padding:16px}
.cd{background:#fff;padding:20px;border-radius:14px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.info{background:#e3f2fd;padding:12px 16px;border-radius:10px;margin-bottom:12px;color:#1565c0;font-size:14px}
.warn{background:#fff3e0;padding:12px 16px;border-radius:10px;margin-bottom:12px;color:#e65100;font-size:14px}
.eb{background:#ffebee;color:#c62828;padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:14px}
.tg{display:inline-block;padding:8px 14px;margin:3px;border-radius:20px;cursor:pointer;font-size:13px;transition:.15s}
.tg.on{background:#e3f2fd;color:#1565c0;border:2px solid #1976d2}
.tg.off{background:#f5f5f5;color:#9e9e9e;border:2px solid #e0e0e0;text-decoration:line-through}
.tg.old{background:#f3e5f5;color:#7b1fa2;border:2px solid #ce93d8}
.sc{font-size:10px;padding:2px 5px;border-radius:8px;margin-left:3px;color:#fff}
.sc.h{background:#4caf50}.sc.m{background:#ff9800}.sc.l{background:#f44336}
.ck{display:inline-block;padding:10px 16px;margin:3px;border-radius:20px;cursor:pointer;background:#fff;border:2px solid #e0e0e0;font-size:13px}
.ck.on{background:#e3f2fd;border-color:#1976d2;color:#1565c0}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;color:#fff;margin-top:10px;text-align:center}
.bb{background:#1976d2}.bo{background:#f57c00}.bg{background:#388e3c}.bp{background:#5c6bc0}
input,textarea{width:100%;padding:12px;margin:4px 0 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px}
label{font-weight:600;color:#424242;display:block;margin-bottom:2px;font-size:14px}
.rw{display:flex;gap:12px}.rw>div{flex:1}
.si-item{background:#fff;border:2px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
.si-item:hover{border-color:#1976d2;background:#e3f2fd}
.ct{font-weight:700;margin:12px 0 8px;color:#1565c0;font-size:14px}
.ct span{background:#e3f2fd;padding:2px 8px;border-radius:14px;font-size:12px;margin-left:4px}
.cb{border-bottom:1px solid #eee;padding-bottom:12px;margin-bottom:10px}
.pg{background:#e0e0e0;border-radius:8px;height:16px;margin:10px 0;overflow:hidden}
.pgb{background:#4caf50;height:100%;border-radius:8px;transition:width .5s}
.lc{background:#fff;border:2px solid #e0e0e0;border-radius:10px;padding:16px;margin-bottom:12px}
.lb{display:flex;gap:10px;margin-top:10px}
.lbtn{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.lbtn.y{background:#4caf50;color:#fff}.lbtn.n{background:#f44336;color:#fff}.lbtn.sel{box-shadow:0 0 0 3px #212121}
.mb{display:flex;gap:8px;margin:12px 0}
.mi{flex:1;background:#f5f5f5;border-radius:10px;padding:12px;text-align:center}
.mi b{display:block;font-size:20px;color:#1976d2}
.ci{background:#f5f5f5;border-radius:10px;padding:10px;text-align:left;font-size:13px}
.ci input{margin-right:6px;transform:scale(1.2)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:12px}
.pcard{background:#fff;border:2px solid #e0e0e0;border-radius:14px;padding:18px;transition:all .2s}
.pcard:hover{border-color:#1976d2}
.pn{font-weight:700;font-size:17px;color:#1a237e;border-bottom:2px solid #e8eaf6;padding-bottom:8px;margin-bottom:10px}
.pd{margin-bottom:8px;font-size:13px;line-height:1.5}
.pd b{display:block;color:#424242;margin-bottom:2px;font-size:12px}
.pd.hl{background:#e8f5e9;padding:10px;border-radius:8px;margin-top:10px}
.pd.hl b{color:#2e7d32}
.st{text-align:center;padding:16px}.st b{font-size:40px;display:block;color:#1976d2}
.hd{display:none}
.ld{text-align:center;padding:30px;color:#999;font-size:14px}
.sp{display:inline-block;width:20px;height:20px;border:3px solid #e0e0e0;border-top:3px solid #1976d2;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ch{padding:12px 16px;border-bottom:1px solid #eee;font-weight:700;font-size:15px;background:#fafafa}
.cms{flex:1;overflow-y:auto;padding:12px}
.msg{margin-bottom:12px}.msg.u{text-align:right}
.msg .bbl{display:inline-block;max-width:90%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;text-align:left;word-break:break-word}
.msg.u .bbl{background:#e3f2fd;border-radius:14px 14px 4px 14px}
.msg.b .bbl{background:#f5f5f5;border-radius:14px 14px 14px 4px}
.cia{padding:10px;border-top:1px solid #eee;display:flex;gap:6px}
.cia input{flex:1;margin:0;padding:10px;font-size:13px}
.cia button{width:60px;padding:10px;margin:0;border:none;border-radius:10px;background:#5c6bc0;color:#fff;font-weight:600;cursor:pointer;font-size:13px}
</style>
</head>
<body>
<div class="top-bar"><h2>DCX</h2><span class="si" id="sidInfo"></span></div>
<div class="main">
<div class="lp">
  <div class="tabs">
    <div class="tab on" data-t="pipe" onclick="swTab('pipe')">파이프라인 실행</div>
    <div class="tab" data-t="ins" onclick="swTab('ins')">인사이트 분석</div>
  </div>
  <div class="steps" id="stBar"></div>
  <div class="ps" id="lScroll">
    <div id="pipeP"></div>
    <div id="insP" class="hd">
        <div class="cd">
          <b>인사이트 분석</b>
          <div style="margin:10px 0">
            <select id="insSel" onchange="insSelChange()" style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px">
              <option value="">세션을 선택하세요...</option>
            </select>
          </div>
          <div id="insActions" class="hd" style="display:flex;gap:8px;flex-wrap:wrap">
            <button onclick="toggleSNA()" style="padding:8px 16px;background:#5c6bc0;color:#fff;border:none;border-radius:16px;cursor:pointer;font-size:13px">SNA 시각화 보기</button>
          </div>
        </div>
        <div id="snaBox" class="cd hd">
          <b>페르소나 네트워크</b>
          <div id="snaGraph" style="height:500px;margin:10px 0"></div>
          <div style="font-size:12px;display:flex;gap:16px;margin-top:8px">
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#667eea"></span> 제품</span>
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#f59e0b"></span> 클러스터</span>
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#10b981"></span> 페르소나</span>
          </div>
        </div>
        <div id="insResults"></div>
        <div id="insTip" style="position:fixed;display:none;background:#fff;padding:14px 18px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.25);font-size:13px;max-width:320px;z-index:99;pointer-events:none;line-height:1.5"></div>
      </div>
  </div>
</div>
<div class="rp">
  <!-- 파이프라인 챗봇 -->
  <div id="rpPipe">
    <div class="ch">AI 챗봇</div>
    <div class="cms" id="cMsgs">
      <div class="msg b"><div class="bbl">안녕하세요! 파이프라인 진행이나 결과에 대해 물어보세요.<br><br>수정 명령도 가능합니다:<br>- "클러스터 1, 3 합쳐줘"<br>- "페르소나 이름을 OO로 바꿔줘"<br>- "인사이트를 OO로 수정해줘"</div></div>
    </div>
    <div class="cia">
      <input id="cIn" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sChat()">
      <button onclick="sChat()">전송</button>
    </div>
  </div>
  <!-- 인사이트 챗봇 -->
  <div id="rpIns" class="hd">
    <div class="ch" style="background:#26a69a">인사이트 챗봇</div>
    <div class="cms" id="insChatMsgs">
      <div class="msg b"><div class="bbl">페르소나와 클러스터 인사이트를 분석할 수 있습니다.<br><br>분석 질문:<br>- "주요 페르소나별 마케팅 전략은?"<br>- "클러스터 1의 핵심 Pain Point는?"<br><br>- "타겟 고객별 접근 방법은?"<br>- "경쟁사 대비 차별화 포인트는?"</div></div>
    </div>
    <div class="cia">
      <input id="insInput" placeholder="인사이트 질문 또는 수정 명령..." onkeydown="if(event.key==='Enter')insChat()">
      <button onclick="insChat()">전송</button>
    </div>
  </div>
</div>
</div>
<script>
const API='',SN=['시작','키워드','크롤링','전처리','라벨링','학습','클러스터링','페르소나'];
let S={sid:null,bk:'',pd:'',ages:[],ar:[],gens:[],kw:[],step:'start',sd:null},csi=0,pt=null;
function E(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function scl(s){return s>=70?'h':s>=50?'m':'l';}
function tgt(){const p=[];if(S.ages.length)p.push(S.ages.join(','));if(S.ar.length)p.push(S.ar.join(','));if(S.gens.length)p.push(S.gens.join(','));return p.join(' | ')||'전체';}
function $$(id){return document.getElementById(id);}

// TAB
function swTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelector(`.tab[data-t="${t}"]`).classList.add('on');
  $$('pipeP').classList.toggle('hd',t!=='pipe');$$('insP').classList.toggle('hd',t!=='ins');
  $$('stBar').classList.toggle('hd',t!=='pipe');
  // 오른쪽 패널 전환
  if(t==='ins'){
    $$('rpPipe').style.display='none';
    $$('rpIns').classList.remove('hd');
    $$('rpIns').style.display='flex';
  }else{
    $$('rpPipe').style.display='flex';
    $$('rpIns').classList.add('hd');
    $$('rpIns').style.display='none';
  }
  if(t==='ins')ldIns();
}

async function ldIns(){
  const sel=$$('insSel');
  // 항상 세션 목록 로드
  try{
    const r=await fetch(API+'/sessions'),d=await r.json();
    sel.innerHTML='<option value="">세션을 선택하세요...</option>';
    (d.sessions||[]).forEach(s=>{if(s.bk){const o=document.createElement('option');o.value=s.sid;o.textContent=`${s.bk} (${s.sid})`;sel.appendChild(o);}});
    if(S.sid){sel.value=S.sid;}
  }catch(e){}
  
  if(!S.sid){
    $$('insResults').innerHTML='<div class="cd"><p style="color:#666;font-size:13px">세션을 선택하면 분석 결과가 표시됩니다.</p></div>';
    $$('insActions').classList.add('hd');
    $$('snaBox').classList.add('hd');
    return;
  }
  // 세션 있으면 액션 버튼 표시 & 결과 로드
  $$('insActions').classList.remove('hd');
  $$('insResults').innerHTML='<div class="ld"><div class="sp"></div> 로딩중...</div>';
  insSid=S.sid;
  try{
    const r=await fetch(API+'/persona-status/'+S.sid),d=await r.json();
    if(d.status==='done'){
      let h=`<div class="cd" style="margin-bottom:4px"><b style="color:#333">페르소나 분석 결과</b> <span style="color:#999;font-size:12px">${E(S.bk)}</span></div>`;
      // 클러스터 원문도 로드
      let clData={};
      try{const cr2=await fetch(API+'/cluster-status/'+S.sid),cd2=await cr2.json();if(cd2.clusters)clData=cd2.clusters;}catch(e3){}
      (d.personas||[]).forEach((cl,ci)=>{
        const cInfo=clData[String(ci)]||clData[String(cl.cluster_id)]||{};
        const topKw=(cInfo.keywords||[]).slice(0,6);
        h+=`<div class="cd"><b style="color:#1976d2">${E(cl.cluster_name||'클러스터 '+cl.cluster_id)}</b> <span style="color:#999;font-size:12px">${cInfo.size||0}건</span>`;
        if(topKw.length>0){h+=`<div style="margin:6px 0;display:flex;flex-wrap:wrap;gap:4px">`;topKw.forEach(k=>{h+=`<span style="padding:2px 8px;background:#e3f2fd;border-radius:10px;font-size:11px;color:#1565c0">${E(k)}</span>`;});h+=`</div>`;}
        h+=`<div class="pgrid">`;
        (cl.personas||[]).forEach(p=>{h+=`<div class="pcard"><div class="pn">${E(p.name||'')}</div><div class="pd" style="border-left:3px solid #42a5f5;padding-left:10px;margin:8px 0"><b style="color:#1565c0">상황</b><p>${E(p.situation||'')}</p></div><div class="pd" style="border-left:3px solid #ef5350;padding-left:10px;margin:8px 0"><b style="color:#c62828">Pain Point</b><p>${E(p.pain_point||'')}</p></div><div class="pd" style="border-left:3px solid #66bb6a;padding-left:10px;margin:8px 0;background:#f1f8e9;border-radius:8px;padding:10px"><b style="color:#2e7d32">인사이트</b><p>${E(p.insight||'')}</p></div></div>`;});
        h+=`</div>`;
        // 주요 키워드 태그
        if(cInfo.keywords&&cInfo.keywords.length>0){h+=`<div style="margin:10px 0"><b style="font-size:12px;color:#666">주요 키워드</b><div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">`;cInfo.keywords.forEach(k=>{h+=`<span style="padding:3px 10px;background:#e3f2fd;border-radius:12px;font-size:11px;color:#1565c0">${E(k)}</span>`;});h+=`</div></div>`;}
        // 원문 샘플
        if(cInfo.samples&&cInfo.samples.length>0){h+=`<details style="margin-top:8px"><summary style="cursor:pointer;color:#5c6bc0;font-size:12px">근거 원문 (${cInfo.samples.length}건)</summary><div style="margin-top:6px">`;cInfo.samples.forEach(s=>{h+=`<div style="padding:6px 10px;margin:4px 0;background:#fafafa;border-radius:8px;font-size:12px"><b>[${E(s.kw||'')}]</b> ${E(s.title||'')}<br><span style="color:#888">${E(s.desc||'')}</span><br><span style="color:#aaa">${E(s.cafe||'')}</span></div>`;});h+=`</div></details>`;}
        h+=`</div>`;});
      h+='<div class="info" style="margin-top:8px">인사이트 챗봇으로 더 깊이 분석하세요!</div>';
      $$('insResults').innerHTML=h;
      // 자동으로 SNA 로드
      loadSNAData();
    }else{
      try{
        const cr=await fetch(API+'/cluster-status/'+S.sid),cd=await cr.json();
        if(cd.status==='done'){
          let h=`<div class="cd" style="margin-bottom:4px"><b style="color:#333">클러스터 결과</b> <span style="color:#999;font-size:12px">${E(S.bk)}</span></div>`;
          const nc=cd.num_clusters||0,cs=cd.clusters||{};
          for(let i=0;i<nc;i++){const c=cs[String(i)]||cs[i]||{};h+=`<div class="cd"><b>클러스터 ${i+1}</b> (${c.size||0}건)`;
            if(c.keywords){h+=`<div style="margin:6px 0;display:flex;flex-wrap:wrap;gap:4px">`;(c.keywords||[]).forEach(k=>{h+=`<span style="padding:2px 8px;background:#e3f2fd;border-radius:10px;font-size:11px;color:#1565c0">${E(k)}</span>`;});h+=`</div>`;}
            if(c.samples&&c.samples.length>0){h+=`<details style="margin-top:6px"><summary style="cursor:pointer;color:#5c6bc0;font-size:12px">원문 샘플</summary>`;c.samples.forEach(s=>{h+=`<div style="padding:4px 8px;margin:3px 0;background:#fafafa;border-radius:6px;font-size:11px"><b>[${E(s.kw||'')}]</b> ${E(s.title||'')}<br><span style="color:#888">${E((s.desc||'').substring(0,100))}</span></div>`;});h+=`</details>`;}
            h+=`</div>`;}
          h+='<div class="info">페르소나 도출을 완료하면 더 자세한 인사이트를 볼 수 있습니다.</div>';
          $$('insResults').innerHTML=h;
        }else{
          $$('insResults').innerHTML=`<div class="cd"><p style="color:#666;font-size:13px">파이프라인 진행중입니다. 완료 후 결과가 여기 표시됩니다.</p></div>`;
        }
      }catch(e2){$$('insResults').innerHTML=`<div class="cd"><p style="color:#666;font-size:13px">데이터 로드에 실패했습니다.</p></div>`;}
    }
  }catch(e){$$('insResults').innerHTML=`<div class="cd"><p style="color:#666;font-size:13px">데이터 로드에 실패했습니다.</p></div>`;}
}
async function ldInsS(sid){
  // 인사이트 탭에서 세션 선택
  try{const r=await fetch(API+'/session/'+sid),resp=await r.json();
    const d=resp.data||resp;
    S.sid=sid;S.bk=d.bk||'';S.pd=d.problemDef||'';S.kw=d.allKw||[];S.sd=d;S.ages=d.ages||[];S.ar=d.ageRange||[];S.gens=d.gens||[];
    $$('sidInfo').textContent=`${S.bk} | ${sid}`;
    ldIns();
  }catch(e){alert('세션 로드 실패');}
}

// STEPS
function rSt(i){csi=i;let h='';SN.forEach((n,j)=>{if(j>0)h+=`<div class="sl ${j<=i?'dn':''}"></div>`;h+=`<div class="sd ${j<i?'dn':j===i?'ac':''}">${j+1}</div>`;});$$('stBar').innerHTML=h;}

// SAVE
async function sv(){try{await fetch(API+'/save-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid:S.sid,data:S.sd})});}catch(e){}}

// START
async function shStart(){
  clearInterval(pt);rSt(0);
  $$('pipeP').innerHTML=`<div class="cd" id="sesC"><div class="ld"><div class="sp"></div> 세션 로딩...</div></div>
    <div class="cd"><b>새로 시작</b><br><br>
    <label>메인 키워드</label><input id="fB" placeholder="예: 에어컨">
    <label>문제정의</label><textarea id="fP" rows="3" placeholder="예: 에어컨 구매 시 소비자 고민 파악"></textarea>

async function genKw(rd){
  try{const r=await fetch(API+'/generate-keywords',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sid:S.sid,bk:S.bk,problemDef:S.pd,round:rd==='r1'?1:rd==='r2'?2:rd==='r3'?3:4,existingKeywords:S.kw.map(k=>k.kw),ages:S.ages,ageRange:S.ar,gens:S.gens})});

  }catch(e){$$('pipeP').innerHTML=`<div class="eb">키워드 생성 실패: ${e.message}</div><button class="btn bo" onclick="genKw('${rd}')">재시도</button>`;}
}

function shKw(rd,nk){
  rSt(1);nk=nk||[];
  const nm={r1:'R1: 발산',r2:'R2: 발산',r3:'R3: 수렴','r3-expand':'R4: 재발산'}[rd]||rd;
  const allCat={};
  S.kw.forEach(k=>{if(!allCat[k.cat])allCat[k.cat]={ex:[],nw:[]};allCat[k.cat].ex.push(k);});
  nk.forEach(k=>{if(!allCat[k.cat])allCat[k.cat]={ex:[],nw:[]};allCat[k.cat].nw.push(k);});
  let mh='';
  Object.keys(allCat).forEach(c=>{
    const ex=allCat[c].ex,nw=allCat[c].nw;
    mh+='<div class="cb"><div class="ct">'+E(c)+'<span>'+(ex.length+nw.length)+'</span></div>';
    ex.forEach(k=>{mh+='<span class="tg old">'+E(k.kw)+'</span>';});
    nw.sort((a,b)=>(b.score||0)-(a.score||0)).forEach(k=>{mh+='<span class="tg on" data-id="'+k.id+'">'+E(k.kw)+'<span class="sc '+scl(k.score||0)+'">'+(k.score||0)+'</span></span>';});
    mh+='</div>';});
  $$('pipeP').innerHTML='<div class="cd"><h3>'+nm+'</h3><p style="color:#666;font-size:13px">'+E(S.bk)+' | '+tgt()+'</p></div><div class="info">누적: '+S.kw.length+'개 | 신규: '+nk.length+'개 (회색=기존, 컬러=신규 클릭으로 승인/거절)</div><div class="cd">'+mh+'</div><button class="btn bo" onclick="apKw(\''+rd+'\')">승인 → 다음</button>';
  document.querySelectorAll('.tg[data-id]').forEach(e=>{e.onclick=function(){this.classList.toggle('on');this.classList.toggle('off');};});
  window._nk=nk;window._lastRd=rd;window._lastNk=nk;
}

async function apKw(rd){
  const ap=[];document.querySelectorAll('.tg.on[data-id]').forEach(e=>{const k=window._nk.find(x=>x.id==e.dataset.id);if(k)ap.push(k);});
  S.kw=S.kw.concat(ap);S.sd.allKw=S.kw;S.sd._pendingKw=[];
  const nx={r1:'r2',r2:'r3',r3:S.kw.length<160?'r3-expand':'final','r3-expand':'final'}[rd]||'final';
  S.sd.step=nx;await sv();
  if(nx==='final'){shFinal();}else{shKwLd({r2:'R2: 발산',r3:'R3: 수렴','r3-expand':'R4: 재발산'}[nx]);genKw(nx);}
}

  let h='';(d.personas||[]).forEach(cl=>{h+=`<div style="margin-bottom:20px"><div style="font-size:16px;font-weight:700;color:#1976d2;margin-bottom:10px;padding:10px 16px;background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-radius:10px">${E(cl.cluster_name||'클러스터 '+cl.cluster_id)}</div><div class="pgrid">`;
    (cl.personas||[]).forEach(p=>{h+=`<div class="pcard"><div class="pn">${E(p.name||'')}</div><div class="pd"><b>상황</b><p>${E(p.situation||'')}</p></div><div class="pd"><b>Pain Point</b><p>${E(p.pain_point||'')}</p></div><div class="pd hl"><b>인사이트</b><p>${E(p.insight||'')}</p></div></div>`;});h+='</div></div>';});

}else if(d.status==='running'){$$('psS').innerHTML=`진행중... ${d.progress||0}%`;$$('psP').style.width=(d.progress||0)+'%';}else if(d.status==='error'){clearInterval(pt);$$('psS').className='eb';$$('psS').innerHTML=d.error||'에러';}}catch(e){}}

// CHAT - 파이프라인 중에도 인터렉션 가능
async function sChat(){
  const inp=$$('cIn'),msg=inp.value.trim();if(!msg)return;inp.value='';
  const ms=$$('cMsgs');
  ms.innerHTML+=`<div class="msg u"><div class="bbl">${E(msg)}</div></div>`;
  ms.innerHTML+=`<div class="msg b" id="typ"><div class="bbl"><div class="sp" style="width:16px;height:16px"></div></div></div>`;
  ms.scrollTop=ms.scrollHeight;
  try{
    const ctx=`제품:${S.bk||'미설정'}, 세션:${S.sid||'없음'}, 현재단계:${SN[csi]||'시작'}, 키워드:${S.kw.length}개`;
    const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sid:S.sid,query:msg,pipeline_context:ctx})});
    if(!r.ok||!(r.headers.get('content-type')||'').includes('json')){$$('typ').remove();ms.innerHTML+=`<div class="msg b"><div class="bbl" style="color:red">서버 오류가 발생했습니다 (${r.status})</div></div>`;return;}
    const d=await r.json();
    $$('typ').remove();
    ms.innerHTML+=`<div class="msg b"><div class="bbl">${(d.answer||d.reply||'응답 없음').replace(/\n/g,'<br>')}</div></div>`;
    ms.scrollTop=ms.scrollHeight;
    // 챗봇 응답에서 파이프라인 액션 감지
    if(d.added_keywords&&d.added_keywords.length>0){var nkList=[];d.added_keywords.forEach(function(kw){if(!S.kw.find(function(k){return k.kw===kw})&&!(window._lastNk||[]).find(function(k){return k.kw===kw})){nkList.push({id:'c'+Date.now()+Math.random(),kw:kw,cat:'챗봇추가',score:50});}});if(nkList.length>0){if(!window._lastNk)window._lastNk=[];window._lastNk=window._lastNk.concat(nkList);S.sd._pendingKw=window._lastNk;sv();ms.innerHTML+='<div class="msg b"><div class="bbl">'+nkList.map(function(k){return k.kw}).join(', ')+' 신규에 추가 (승인 필요)</div></div>';if(window._lastRd){shKw(window._lastRd,window._lastNk);}else{S.kw=S.kw.concat(nkList);S.sd.allKw=S.kw;ms.innerHTML+='<div class="msg b"><div class="bbl">키워드 목록에 바로 추가됨</div></div>';}}}
    if(d.action){handleAction(d.action);}
  }catch(e){$$('typ')?.remove();ms.innerHTML+=`<div class="msg b"><div class="bbl" style="color:red">오류: ${e.message}</div></div>`;}
}

function handleAction(action){
  // 챗봇이 파이프라인에 반영할 액션을 보내면 처리
  if(action.type==='add_keywords'&&action.keywords){
    action.keywords.forEach(w=>S.kw.push({id:'c'+Date.now()+Math.random(),kw:w,cat:'챗봇추가',score:60}));
    S.sd.allKw=S.kw;sv();
  }else if(action.type==='navigate'){
    nav(action.step);
  }
}

// INIT
shStart();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
let insSid='';
async function insSelChange(){
  insSid=$$('insSel').value;
  if(!insSid){$$('insResults').innerHTML='';$$('insActions').classList.add('hd');$$('snaBox').classList.add('hd');return;}
  const opt=$$('insSel').options[$$('insSel').selectedIndex];
  const ms=$$('insChatMsgs');
  ms.innerHTML=`<div class="msg b"><div class="bbl">"${opt.textContent}" 세션이 선택되었습니다. 질문해주세요!</div></div>`;
  try{const r=await fetch(API+'/session/'+insSid),d=await r.json();S.sid=insSid;S.bk=d.bk||'';S.pd=d.problemDef||'';S.kw=d.allKw||[];S.sd=d;$$('sidInfo').textContent=`${S.bk} | ${insSid}`;}catch(e){}
  ldIns();
}

function toggleSNA(){
  const b=$$('snaBox');b.classList.toggle('hd');
  if(!b.classList.contains('hd')&&insSid)loadSNAData();
}

async function loadSNAData(){
  if(!insSid)return;
  try{
    const r=await fetch(API+'/sna-data/'+insSid),d=await r.json();
    if(d.status==='ok')renderSNA(d.nodes,d.links);
  }catch(e){}
}

function renderSNA(nodes,links){
  const c=$$('snaGraph');c.innerHTML='';
  const w=c.clientWidth||360,h=340;
  const svg=d3.select('#snaGraph').append('svg').attr('width',w).attr('height',h);
  const cm={'product':'#667eea','cluster':'#f59e0b','persona':'#10b981'};
  const sim=d3.forceSimulation(nodes).force('link',d3.forceLink(links).id(d=>d.id).distance(120)).force('charge',d3.forceManyBody().strength(-400)).force('center',d3.forceCenter(w/2,h/2)).force('x',d3.forceX(w/2).strength(0.1)).force('y',d3.forceY(h/2).strength(0.1)).force('collision',d3.forceCollide().radius(d=>d.size+15));
  const link=svg.append('g').selectAll('line').data(links).enter().append('line').attr('stroke','#ddd').attr('stroke-width',2);
  const node=svg.append('g').selectAll('circle').data(nodes).enter().append('circle').attr('r',d=>d.size).attr('fill',d=>cm[d.type]).attr('stroke','#fff').attr('stroke-width',2).style('cursor','pointer')
    .on('mouseover',(ev,d)=>{const t=$$('insTip');let html='<div style="font-weight:700;font-size:14px;margin-bottom:6px;color:#1a237e">'+d.name+'</div>';if(d.type==='persona'){if(d.pain_point)html+='<div style="margin:4px 0;padding:4px 8px;border-left:3px solid #ef5350"><span style="color:#c62828;font-weight:600">Pain:</span> '+d.pain_point+'</div>';if(d.insight)html+='<div style="margin:4px 0;padding:4px 8px;border-left:3px solid #66bb6a;background:#f1f8e9;border-radius:4px"><span style="color:#2e7d32;font-weight:600">Insight:</span> '+d.insight+'</div>';}if(d.type==='cluster'){html+='<div style="color:#666">클러스터</div>';}t.innerHTML=html;t.style.display='block';t.style.left=(ev.pageX+15)+'px';t.style.top=(ev.pageY-15)+'px';})
    .on('mouseout',()=>{$$('insTip').style.display='none';})
    .call(d3.drag().on('start',(ev,d)=>{if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y;}).on('end',(ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  const label=svg.append('g').selectAll('text').data(nodes).enter().append('text').text(d=>d.name.length>8?d.name.substring(0,8)+'...':d.name).attr('font-size',10).attr('text-anchor','middle').attr('dy',d=>d.size+12).attr('fill','#666');
  sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('cx',d=>d.x=Math.max(d.size,Math.min(w-d.size,d.x))).attr('cy',d=>d.y=Math.max(d.size,Math.min(h-d.size,d.y)));label.attr('x',d=>d.x).attr('y',d=>d.y);});
}

async function insChat(){
  const inp=$$('insInput'),msg=inp.value.trim();if(!msg||!insSid)return;inp.value='';
  const ms=$$('insChatMsgs');
  ms.innerHTML+=`<div class="msg u"><div class="bbl">${E(msg)}</div></div>`;
  ms.innerHTML+=`<div class="msg b" id="insTyp"><div class="bbl"><div class="sp" style="width:16px;height:16px"></div></div></div>`;
  ms.scrollTop=ms.scrollHeight;
  try{
    const r=await fetch(API+'/insight-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sid:insSid,query:msg,bk:S.bk})});
    if(!r.ok||!(r.headers.get('content-type')||'').includes('json')){$$('insTyp').remove();ms.innerHTML+=`<div class="msg b"><div class="bbl" style="color:red">서버 오류 (${r.status})</div></div>`;return;}
    const d=await r.json();$$('insTyp').remove();
    let html=d.answer||d.reply||'응답 없음';
    if(d.modified){html+=`<br><span style="color:#26a69a;font-size:12px">데이터가 수정되었습니다. 새로고침 중...</span>`;}
    if(d.sources&&d.sources.length>0){html+=`<br><details style="margin-top:8px;font-size:11px;color:#888"><summary style="cursor:pointer;color:#5c6bc0">참고 데이터 (${d.sources.length}건)</summary><ul>`;d.sources.forEach(s=>{html+=`<li>${E(s.title||'')} - ${E(s.cafe||'')}</li>`;});html+='</ul></details>';}
    ms.innerHTML+=`<div class="msg b"><div class="bbl">${html.replace(/\n/g,'<br>')}</div></div>`;ms.scrollTop=ms.scrollHeight;
    if(d.modified){setTimeout(()=>{ldIns();loadSNAData();},1500);}
  }catch(e){$$('insTyp')?.remove();ms.innerHTML+=`<div class="msg b"><div class="bbl" style="color:red">오류: ${e.message}</div></div>`;}
}
</script>
